# Despliegue 100% estático (mejor para SEO y sin BD en runtime).
# nuxt generate prerenderiza todas las rutas a HTML en .output/public.
[build]
  command = "npm run generate"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"

# La URL antigua tenía mayúsculas; @nuxt/content normaliza a minúsculas.
# 301 para no perder el posicionamiento de la URL ya indexada.
[[redirects]]
  from = "/watches/berny/compressor-V4-am439m"
  to = "/watches/berny/compressor-v4-am439m"
  status = 301
  force = true
